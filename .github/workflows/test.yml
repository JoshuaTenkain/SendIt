name: Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Tests & Lint
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sendit
          POSTGRES_PASSWORD: sendit
          POSTGRES_DB: sendit
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Lint with ruff
        run: |
          cd backend
          ruff check .
      
      - name: Format check with black
        run: |
          cd backend
          black --check .
      
      - name: Type check with mypy
        run: |
          cd backend
          mypy app --ignore-missing-imports || true
      
      - name: Run pytest
        env:
          SENDIT_DATABASE_URL: postgresql+psycopg://sendit:sendit@localhost:5432/sendit
          SENDIT_JWT_SECRET_KEY: test-secret-key-for-ci
          SENDIT_GUEST_TOKEN_SECRET: test-guest-secret-key-for-ci
          SENDIT_PAYFAST_MERCHANT_ID: test
          SENDIT_PAYFAST_MERCHANT_KEY: test
        run: |
          cd backend
          pytest tests/ --cov=app --cov-report=xml
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage.xml
          flags: backend

  frontend:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        run: |
          cd frontend
          npm install
      
      - name: Lint with ESLint
        run: |
          cd frontend
          npm run lint
      
      - name: Type check with TypeScript
        run: |
          cd frontend
          npm run type-check
      
      - name: Build
        run: |
          cd frontend
          npm run build
